<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pevitz</title>
<style>
  :root { --fg: #1a1a1a; --muted: #666; --bg: #fafafa; --accent: #6366f1; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
  main { flex: 1; max-width: 640px; margin: 0 auto; padding: 6rem 2rem 3rem; }
  h1 { font-size: 3rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
  .tagline { color: var(--muted); font-size: 1.1rem; margin-bottom: 3rem; }
  nav a { color: var(--accent); text-decoration: none; margin-right: 1.5rem; font-size: 0.95rem; }
  nav a:hover { text-decoration: underline; }
  footer { padding: 2rem; text-align: center; color: var(--muted); font-size: 0.85rem; }
</style>
</head>
<body>
<main>
  <h1>Pevitz</h1>
  <p class="tagline">Independent content production tooling.</p>
  <nav>
    <a href="/privacy">Privacy Policy</a>
    <a href="/terms">Terms of Service</a>
  </nav>
</main>
<footer>&copy; 2026 Pevitz · hello@pevitz.com</footer>
</body>
</html>
